version: "3.9"
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "http://backend:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
